<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lens Log">
<title>Contact Lens Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #7b6cff;
    --accent2: #a89cff;
    --accent-glow: rgba(123, 108, 255, 0.3);
    --worn: #5b4fe8;
    --worn-border: #7b6cff;
    --text: #e8e6ff;
    --text-dim: #7a78a0;
    --text-muted: #44425a;
    --green: #4ecca3;
    --red: #ff6b8a;
    --warn: #ffc857;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .app {
    width: 100%;
    max-width: 420px;
    padding: 0 16px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    padding: 48px 0 24px;
    text-align: center;
  }

  .header-icon {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px var(--accent-glow));
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header p {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Progress ring card */
  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .progress-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .ring-wrap {
    position: relative;
    width: 80px;
    height: 80px;
    flex-shrink: 0;
  }

  .ring-wrap svg {
    width: 80px;
    height: 80px;
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    filter: drop-shadow(0 0 4px var(--accent));
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-pct {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--accent2);
    line-height: 1;
  }

  .progress-info { flex: 1; }

  .progress-count {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 4px;
  }

  .progress-count .num {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .progress-count .denom {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .remaining-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--green);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* Calendar card */
  .calendar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .cal-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .cal-nav button:active {
    background: var(--accent);
    border-color: var(--accent);
  }

  .cal-month {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-dow {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    text-align: center;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    padding: 4px 0 8px;
    text-transform: uppercase;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .cal-day span {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    line-height: 1;
  }

  .cal-day .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent2);
    margin-top: 3px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cal-day.empty { cursor: default; pointer-events: none; }

  .cal-day.future {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
  }

  .cal-day.today {
    border-color: var(--accent);
  }

  .cal-day.today span { color: var(--accent2); font-weight: 500; }

  .cal-day.worn {
    background: var(--worn);
    border-color: var(--worn-border);
    box-shadow: 0 0 12px rgba(91, 79, 232, 0.4);
  }

  .cal-day.worn span { color: #fff; }
  .cal-day.worn .dot { opacity: 1; }

  .cal-day:not(.empty):not(.future):not(.worn):active {
    transform: scale(0.88);
    background: var(--surface2);
  }

  .cal-day.worn:active { transform: scale(0.88); }

  /* Reset button */
  .reset-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    margin-bottom: 16px;
    -webkit-tap-highlight-color: transparent;
  }

  .reset-btn:active, .reset-btn.ready {
    background: rgba(255, 107, 138, 0.1);
    border-color: var(--red);
    color: var(--red);
  }

  /* Confirm dialog */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: flex-end;
    z-index: 100;
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    transform: translateY(20px);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .overlay.show .dialog { transform: translateY(0); }

  .dialog h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .dialog p {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .dialog-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .dialog-btns button {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-cancel {
    background: var(--surface2);
    color: var(--text-dim);
  }

  .btn-confirm {
    background: rgba(255, 107, 138, 0.15);
    color: var(--red);
    border-color: var(--red) !important;
  }

  /* Flash toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    border-radius: 40px;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.add { border-color: var(--accent); color: var(--accent2); }
  .toast.remove { border-color: var(--border); color: var(--text-dim); }
  .toast.warn { border-color: var(--warn); color: var(--warn); }

  /* Batch info */
  .batch-info {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-icon">👁</span>
    <h1>Contact Lens Log</h1>
    <p>Tap a day to mark your lenses worn</p>
  </div>

  <!-- Progress Ring -->
  <div class="progress-card">
    <div class="ring-wrap">
      <svg viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="33"/>
        <circle class="ring-fill" id="ringFill" cx="40" cy="40" r="33"
          stroke-dasharray="207.3"
          stroke-dashoffset="207.3"/>
      </svg>
      <div class="ring-label">
        <span class="ring-pct" id="ringPct">0%</span>
      </div>
    </div>
    <div class="progress-info">
      <div class="progress-count">
        <span class="num" id="daysNum">0</span>
        <span class="denom">/30</span>
      </div>
      <div class="progress-label">Days worn this batch</div>
      <div class="remaining-badge" id="remainingBadge">30 days remaining</div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar-card">
    <div class="cal-nav">
      <button id="prevBtn">&#8249;</button>
      <span class="cal-month" id="calMonth"></span>
      <button id="nextBtn">&#8250;</button>
    </div>
    <div class="cal-grid" id="calGrid">
      <!-- Days of week headers -->
      <div class="cal-dow">Sun</div>
      <div class="cal-dow">Mon</div>
      <div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div>
      <div class="cal-dow">Thu</div>
      <div class="cal-dow">Fri</div>
      <div class="cal-dow">Sat</div>
    </div>
  </div>

  <!-- Reset -->
  <button class="reset-btn" id="resetBtn">⟳ Reset — Start New 30-Day Batch</button>

  <!-- Batch date -->
  <div class="batch-info" id="batchInfo"></div>
</div>

<!-- Confirm Dialog -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <h3>Start a new batch?</h3>
    <p>This will clear all 30 logged days and begin a fresh tracking period. This cannot be undone.</p>
    <div class="dialog-btns">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-confirm" id="confirmBtn">Yes, Reset</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'contact-lens-log-v1';
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // --- State ---
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch {}
    return { wornDays: [], batchStart: new Date().toISOString() };
  }

  function saveData(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  }

  let data = loadData();
  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();

  // --- Toast ---
  let toastTimer = null;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 1800);
  }

  // --- Render progress ---
  function renderProgress() {
    const worn = data.wornDays.length;
    const pct = Math.round((worn / 30) * 100);
    const circ = 207.3;
    const offset = circ - (circ * worn / 30);
    document.getElementById('ringFill').style.strokeDashoffset = offset;
    document.getElementById('ringPct').textContent = pct + '%';
    document.getElementById('daysNum').textContent = worn;
    const rem = Math.max(0, 30 - worn);
    document.getElementById('remainingBadge').textContent = rem === 0 ? '✓ Batch complete!' : rem + ' days remaining';
    document.getElementById('remainingBadge').style.color = rem === 0 ? 'var(--green)' : 'var(--green)';

    // Highlight reset button when complete
    const rb = document.getElementById('resetBtn');
    rb.classList.toggle('ready', worn >= 30);

    // Batch start info
    const bs = new Date(data.batchStart);
    document.getElementById('batchInfo').textContent =
      'Batch started ' + MONTHS[bs.getMonth()] + ' ' + bs.getDate() + ', ' + bs.getFullYear();
  }

  // --- Render calendar ---
  function renderCalendar() {
    document.getElementById('calMonth').textContent = MONTHS[viewMonth] + ' ' + viewYear;

    const grid = document.getElementById('calGrid');
    // Remove all day cells (keep the 7 dow headers)
    const cells = grid.querySelectorAll('.cal-day, .cal-empty');
    cells.forEach(c => c.remove());

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const wornSet = new Set(data.wornDays);

    // Empty cells before 1st
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = viewYear + '-' + String(viewMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      const cellDate = new Date(viewYear, viewMonth, d);
      const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());

      const el = document.createElement('div');
      el.className = 'cal-day';

      if (cellDate > todayDate) el.classList.add('future');
      if (cellDate.getTime() === todayDate.getTime()) el.classList.add('today');
      if (wornSet.has(dateStr)) el.classList.add('worn');

      const span = document.createElement('span');
      span.textContent = d;
      el.appendChild(span);

      const dot = document.createElement('div');
      dot.className = 'dot';
      el.appendChild(dot);

      if (!el.classList.contains('future')) {
        el.addEventListener('click', () => toggleDay(dateStr, el));
      }

      grid.appendChild(el);
    }
  }

  function toggleDay(dateStr, el) {
    const wornSet = new Set(data.wornDays);
    if (wornSet.has(dateStr)) {
      wornSet.delete(dateStr);
      el.classList.remove('worn');
      showToast('Day unmarked', 'remove');
    } else {
      if (wornSet.size >= 30) {
        showToast('30/30 reached — reset to start a new batch', 'warn');
        return;
      }
      wornSet.add(dateStr);
      el.classList.add('worn');
      showToast('Contact day logged!', 'add');
    }
    data.wornDays = Array.from(wornSet);
    saveData(data);
    renderProgress();
  }

  // --- Nav ---
  document.getElementById('prevBtn').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  // --- Reset ---
  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('overlay').classList.add('show');
  });

  document.getElementById('cancelBtn').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('show');
  });

  document.getElementById('overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('overlay')) {
      document.getElementById('overlay').classList.remove('show');
    }
  });

  document.getElementById('confirmBtn').addEventListener('click', () => {
    data = { wornDays: [], batchStart: new Date().toISOString() };
    saveData(data);
    document.getElementById('overlay').classList.remove('show');
    renderProgress();
    renderCalendar();
    showToast('New batch started!', 'add');
  });

  // --- Init ---
  renderProgress();
  renderCalendar();
</script>
</body>
</html>
