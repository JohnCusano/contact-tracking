<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lens Log">
<title>Lens Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #7b6cff;
    --accent2: #a89cff;
    --worn: #5b4fe8;
    --worn-border: #7b6cff;
    --text: #e8e6ff;
    --text-dim: #7a78a0;
    --text-muted: #44425a;
    --green: #4ecca3;
    --red: #ff6b8a;
    --warn: #ffc857;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px 28px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(123,108,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .header-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #7b6cff, #a89cff);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .header-subtitle {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  .progress-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .progress-days {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent2);
    line-height: 1;
  }

  .progress-days span {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .progress-remaining {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }

  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #7b6cff, #a89cff);
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(123,108,255,0.5);
  }

  .flash {
    text-align: center;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 7px 12px;
    border-radius: 8px;
    margin-bottom: 14px;
    animation: fadeIn 0.2s ease;
  }

  .flash.add    { background: rgba(78,204,163,0.12); color: var(--green); border: 1px solid rgba(78,204,163,0.25); }
  .flash.remove { background: rgba(255,107,138,0.12); color: var(--red);  border: 1px solid rgba(255,107,138,0.25); }
  .flash.warn   { background: rgba(255,200,87,0.12);  color: var(--warn); border: 1px solid rgba(255,200,87,0.25); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--border); color: var(--text); }

  .month-label {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }

  .dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 4px;
  }

  .dow {
    text-align: center;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    padding: 4px 0;
    letter-spacing: 0.5px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 14px;
  }

  .cal-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
    border: 1px solid transparent;
    color: var(--text-dim);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .cal-cell:active:not(.empty):not(.future) { opacity: 0.7; }
  .cal-cell.empty   { background: transparent; cursor: default; border: none; }
  .cal-cell.future  { opacity: 0.3; cursor: default; }
  .cal-cell.today   { border-color: var(--accent); color: var(--text); }
  .cal-cell.worn    {
    background: var(--worn);
    border-color: var(--worn-border);
    color: #fff;
    box-shadow: 0 0 10px rgba(123,108,255,0.4);
  }

  .lens-icon { font-size: 8px; line-height: 1; margin-top: 1px; opacity: 0.85; }

  .batch-info {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 16px;
  }

  .reset-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }

  .reset-btn:hover:not(:disabled) {
    background: rgba(123,108,255,0.15);
    border-color: var(--accent);
    color: var(--accent2);
  }

  .reset-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .confirm-box {
    background: rgba(255,107,138,0.08);
    border: 1px solid rgba(255,107,138,0.25);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .confirm-text {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .confirm-actions { display: flex; gap: 8px; }

  .btn-yes, .btn-no {
    flex: 1;
    padding: 9px;
    border-radius: 9px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-yes { background: rgba(255,107,138,0.2); color: var(--red);   border: 1px solid rgba(255,107,138,0.3); }
  .btn-yes:hover { background: rgba(255,107,138,0.35); }
  .btn-no  { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
  .btn-no:hover  { background: var(--border); color: var(--text); }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="header-icon">◎</div>
    <div>
      <div class="header-title">Lens Log</div>
      <div class="header-subtitle">30-DAY CONTACT TRACKER</div>
    </div>
  </div>

  <div class="progress-block">
    <div class="progress-top">
      <div class="progress-days" id="daysWorn">0 <span>/ 30 days</span></div>
      <div class="progress-remaining" id="remaining">30 days remaining</div>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div id="flash" style="display:none" class="flash"></div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>

  <div class="dow-row">
    <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div>
    <div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div>
    <div class="dow">Sat</div>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="batch-info" id="batchInfo"></div>

  <div id="resetArea">
    <button class="reset-btn" id="resetBtn" disabled>Reset Batch</button>
  </div>
</div>

<script>
  const STORAGE_KEY = "contact-lens-tracker-v2";
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  // --- Data ---
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { wornDays: [], batchStart: new Date().toISOString() };
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
  }

  let appData = loadData();
  let viewYear = new Date().getFullYear();
  let viewMonth = new Date().getMonth();
  let confirmShowing = false;
  let flashTimer = null;

  // --- Helpers ---
  function todayStr() {
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  }

  function cellDateStr(day) {
    return `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }

  function isFuture(day) {
    const d = new Date(`${cellDateStr(day)}T12:00:00`);
    return d > new Date();
  }

  function showFlash(msg, type) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.className = `flash ${type}`;
    el.style.display = 'block';
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(() => { el.style.display = 'none'; }, 1800);
  }

  // --- Render ---
  function render() {
    const wornSet = new Set(appData.wornDays);
    const daysWorn = appData.wornDays.length;
    const remaining = 30 - daysWorn;
    const pct = Math.min((daysWorn / 30) * 100, 100);

    // Progress
    document.getElementById('daysWorn').innerHTML = `${daysWorn} <span>/ 30 days</span>`;
    document.getElementById('progressFill').style.width = pct + '%';
    if (remaining <= 0) {
      document.getElementById('remaining').innerHTML = `<span style="color:#a89cff">✦ Batch complete!</span>`;
    } else {
      document.getElementById('remaining').textContent = `${remaining} ${remaining===1?'day':'days'} remaining`;
    }

    // Month label
    document.getElementById('monthLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;

    // Batch info
    const bd = new Date(appData.batchStart);
    document.getElementById('batchInfo').textContent =
      `Batch started ${MONTHS[bd.getMonth()]} ${bd.getDate()}, ${bd.getFullYear()}`;

    // Calendar
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const ts = todayStr();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      grid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const ds = cellDateStr(day);
      const worn = wornSet.has(ds);
      const isToday = ds === ts;
      const future = isFuture(day);

      const cell = document.createElement('div');
      let cls = 'cal-cell';
      if (worn) cls += ' worn';
      if (isToday) cls += ' today';
      if (future) cls += ' future';
      cell.className = cls;
      cell.innerHTML = day + (worn ? '<span class="lens-icon">◎</span>' : '');

      if (!future) {
        cell.addEventListener('click', () => toggleDay(ds));
      }
      grid.appendChild(cell);
    }

    // Reset button
    if (!confirmShowing) {
      const area = document.getElementById('resetArea');
      area.innerHTML = `<button class="reset-btn" id="resetBtn" ${daysWorn===0?'disabled':''}>
        ${daysWorn >= 30 ? '✦ Reset — Start New Batch' : 'Reset Batch'}
      </button>`;
      document.getElementById('resetBtn').addEventListener('click', () => {
        confirmShowing = true;
        renderConfirm();
      });
    }
  }

  function renderConfirm() {
    const daysWorn = appData.wornDays.length;
    const area = document.getElementById('resetArea');
    area.innerHTML = `
      <div class="confirm-box">
        <div class="confirm-text">
          Reset all ${daysWorn} logged day${daysWorn!==1?'s':''}?<br>
          This starts a fresh 30-day batch.
        </div>
        <div class="confirm-actions">
          <button class="btn-yes" id="yesBtn">Yes, reset</button>
          <button class="btn-no" id="noBtn">Cancel</button>
        </div>
      </div>`;
    document.getElementById('yesBtn').addEventListener('click', () => {
      appData = { wornDays: [], batchStart: new Date().toISOString() };
      saveData();
      confirmShowing = false;
      showFlash('New 30-day batch started!', 'add');
      render();
    });
    document.getElementById('noBtn').addEventListener('click', () => {
      confirmShowing = false;
      render();
    });
  }

  function toggleDay(ds) {
    const set = new Set(appData.wornDays);
    if (set.has(ds)) {
      set.delete(ds);
      showFlash('Day unmarked', 'remove');
    } else {
      if (set.size >= 30) {
        showFlash('30 days reached! Reset to start a new batch.', 'warn');
        return;
      }
      set.add(ds);
      showFlash('Contact day logged!', 'add');
    }
    appData.wornDays = Array.from(set);
    saveData();
    render();
  }

  // Nav
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (viewMonth === 0) { viewMonth = 11; viewYear--; }
    else viewMonth--;
    render();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (viewMonth === 11) { viewMonth = 0; viewYear++; }
    else viewMonth++;
    render();
  });

  // Init
  render();
</script>
</body>
</html>
